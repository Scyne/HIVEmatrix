<!DOCTYPE html>
<html>
	<head>
		<title>root@HIVE</title>
		<meta name="robots" content="noindex">
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
		<style>
			body {
				background: black;
				overflow: hidden;
				margin: 0;
			}
			canvas {
				width: 100vw;
				height: 100vh;
			}
			#status {
				position: fixed;
				bottom: 18px;
				right: 18px;
				font-family: "Courier New", Courier, monospace;
				font-size: 11px;
				color: hsl(252, 100%, 80%);
				background: rgba(0, 0, 0, 0.55);
				border: 1px solid hsl(252, 100%, 25%);
				padding: 5px 10px;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				display: flex;
				align-items: center;
				gap: 7px;
				pointer-events: none;
				user-select: none;
			}
			#status::before {
				content: "";
				display: inline-block;
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: hsl(252, 100%, 70%);
				box-shadow: 0 0 6px 2px hsl(252, 100%, 60%);
				animation: pulse 2s ease-in-out infinite;
			}
			@keyframes pulse {
				0%, 100% { opacity: 1; }
				50%       { opacity: 0.3; }
			}
		</style>
	</head>
	<body>
		<!--
			YO! Scyne Here!

			This is my backend server for several things. If you want to know what I'm up to
			just head on over to scyne.com or message me on discord (@scyne).
			
			Oh, and if you are digging into my support skills, bustin' bugs makes me feel good.
			
			https://youtu.be/0tdyU_gW6WE
		-->
		<div id="status">HIVE Online</div>
		
		<script>
			async function updateUptime() {
				const statusElement = document.getElementById('status');
				const webhookUrl = 'https://n8n.hive.scyne.com/webhook/server-uptime';

				try {
					const response = await fetch(webhookUrl);
					if (!response.ok) throw new Error('Network response was not ok');
					
					const data = await response.json();
					
					if (data.status === "ok" && data.uptime && data.uptime.human_readable) {
						statusElement.textContent = `HIVE Online // UP: ${data.uptime.human_readable}`;
					}
				} catch (error) {
					console.error('Failed to fetch uptime:', error);
					// Fallback to original text if fetch fails
					statusElement.textContent = 'HIVE Online';
				}
			}

			// Run on load
			updateUptime();
			// Refresh every 60 seconds to keep the minutes current
			setInterval(updateUptime, 60000);
		</script>

		<script type="module" src="js/main.js"></script>
	</body>
</html>
